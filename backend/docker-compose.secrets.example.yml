services:
  api:
    image: seatsip-api:latest
    environment:
      NODE_ENV: production
      DB_PATH: /var/lib/seatsip/seatsip.db
      JWT_ACCESS_SECRET_CURRENT_FILE: /run/secrets/jwt_access_current
      JWT_REFRESH_SECRET_CURRENT_FILE: /run/secrets/jwt_refresh_current
      DB_ENCRYPTION_KEY_FILE: /run/secrets/db_encryption_key
      RAZORPAY_KEY_SECRET_FILE: /run/secrets/razorpay_key_secret
    secrets:
      - jwt_access_current
      - jwt_refresh_current
      - db_encryption_key
      - razorpay_key_secret

secrets:
  jwt_access_current:
    external: true
  jwt_refresh_current:
    external: true
  db_encryption_key:
    external: true
  razorpay_key_secret:
    external: true

